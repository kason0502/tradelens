<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
<!-- BULL — original vector, rigged. Idle breathing -> periodic TRIGGER every ~4s:
     head dips & charges, nostrils blast steam, eyes flare, green pulse. -->
<defs>
  <linearGradient id="em" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#16a34a"/></linearGradient>
  <radialGradient id="emHalo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#22e07a" stop-opacity=".5"/><stop offset="70%" stop-color="#22c55e" stop-opacity=".1"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/></radialGradient>
  <radialGradient id="eyeG" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#eafff3"/><stop offset="55%" stop-color="#3dff90" stop-opacity=".9"/><stop offset="100%" stop-color="#3dff90" stop-opacity="0"/></radialGradient>
  <radialGradient id="stm" cx="50%" cy="45%" r="60%"><stop offset="0" stop-color="#f1fff7" stop-opacity=".85"/><stop offset="100%" stop-color="#f1fff7" stop-opacity="0"/></radialGradient>
  <filter id="b1" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
  <style>
    .halo{transform-box:fill-box;transform-origin:center;animation:halo 4s ease-in-out infinite}
    @keyframes halo{0%,56%,100%{opacity:.45;transform:scale(1)}70%{opacity:1;transform:scale(1.14)}}
    .bull{transform-box:fill-box;transform-origin:50% 32%;animation:bull 4s cubic-bezier(.5,0,.25,1) infinite}
    @keyframes bull{0%{transform:translateY(0) rotate(0) scale(1)}30%{transform:translateY(-3px) scale(1.02)}56%{transform:translateY(0) scale(1)}67%{transform:translateY(11px) rotate(4deg) scale(1.03)}78%{transform:translateY(-3px) rotate(-1deg) scale(1.012)}100%{transform:translateY(0) rotate(0) scale(1)}}
    .eye{transform-box:fill-box;transform-origin:center;animation:eye 4s ease-in-out infinite}
    @keyframes eye{0%,54%,100%{opacity:.45;transform:scale(.85)}40%{opacity:.6}70%{opacity:1;transform:scale(1.3)}}
    .blast{opacity:0;transform-box:fill-box;transform-origin:center}
    .bL{animation:bl 4s ease-out infinite}.bR{animation:br 4s ease-out infinite}
    @keyframes bl{0%,62%{opacity:0;transform:translate(0,0) scale(.3)}72%{opacity:.9}100%,92%{opacity:0;transform:translate(-46px,10px) scale(2.4)}}
    @keyframes br{0%,62%{opacity:0;transform:translate(0,0) scale(.3)}72%{opacity:.9}100%,92%{opacity:0;transform:translate(46px,10px) scale(2.4)}}
    .iL{opacity:0;transform-box:fill-box;transform-origin:center;animation:idle 3.1s ease-out infinite}
    .iR{opacity:0;transform-box:fill-box;transform-origin:center;animation:idle 3.1s ease-out .8s infinite}
    @keyframes idle{0%{opacity:0;transform:translateY(0) scale(.5)}30%{opacity:.4}100%{opacity:0;transform:translateY(-26px) scale(1.5)}}
    .p{fill:#7dffb4;opacity:0;animation:rise 6s linear infinite}
    @keyframes rise{0%{opacity:0;transform:translateY(0)}15%{opacity:.8}100%{opacity:0;transform:translateY(-70px)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}.eye{opacity:.7}}
  </style>
</defs>
<ellipse class="halo" cx="120" cy="124" rx="104" ry="110" fill="url(#emHalo)"/>
<!-- steam (nostril vents) -->
<g filter="url(#b1)">
  <ellipse class="iL" cx="110" cy="170" rx="11" ry="8" fill="url(#stm)"/><ellipse class="iR" cx="130" cy="170" rx="11" ry="8" fill="url(#stm)"/>
  <ellipse class="blast bL" cx="110" cy="170" rx="16" ry="12" fill="url(#stm)"/><ellipse class="blast bR" cx="130" cy="170" rx="16" ry="12" fill="url(#stm)"/>
</g>
<g class="bull">
  <!-- horns -->
  <path d="M74 92 C 52 82 40 62 45 38" fill="none" stroke="url(#em)" stroke-width="13" stroke-linecap="round"/>
  <path d="M166 92 C 188 82 200 62 195 38" fill="none" stroke="url(#em)" stroke-width="13" stroke-linecap="round"/>
  <!-- ears -->
  <path d="M80 108 L57 99 L76 122 Z" fill="url(#em)"/><path d="M160 108 L183 99 L164 122 Z" fill="url(#em)"/>
  <!-- forelock -->
  <path d="M107 80 L120 58 L133 80 Z" fill="url(#em)"/>
  <!-- face -->
  <path d="M120 72 C 94 72 78 88 78 110 C 78 146 96 192 120 192 C 144 192 162 146 162 110 C 162 88 146 72 120 72 Z" fill="url(#em)"/>
  <!-- muzzle shading -->
  <ellipse cx="120" cy="162" rx="30" ry="25" fill="#0c2a1b" opacity=".30"/>
  <!-- eyes (dark) -->
  <ellipse cx="103" cy="117" rx="9.5" ry="6" transform="rotate(20 103 117)" fill="#06160e"/>
  <ellipse cx="137" cy="117" rx="9.5" ry="6" transform="rotate(-20 137 117)" fill="#06160e"/>
  <!-- nostrils -->
  <ellipse cx="110" cy="164" rx="5.5" ry="8" fill="#06160e"/><ellipse cx="130" cy="164" rx="5.5" ry="8" fill="#06160e"/>
</g>
<!-- eye glow overlay -->
<circle class="eye" cx="103" cy="117" r="13" fill="url(#eyeG)"/><circle class="eye" cx="137" cy="117" r="13" fill="url(#eyeG)"/>
<!-- particles -->
<circle class="p" cx="92" cy="150" r="2.5"/><circle class="p" cx="150" cy="140" r="2" style="animation-delay:1.5s"/>
<circle class="p" cx="120" cy="160" r="3" style="animation-delay:2.8s"/><circle class="p" cx="138" cy="150" r="2" style="animation-delay:4.2s"/>
</svg>
