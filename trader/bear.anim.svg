<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 1016" width="728" height="1016">
<!-- BEAR indicator — idle breathing + glowing eyes + floating embers, with a
     periodic ROAR every ~4s: head pushes forward, eyes flare, a red shockwave
     radiates, and a mouth-flash opens. (Raster can't truly open the mouth, so the
     roar is conveyed by push + shockwave + mouth glow.) Tweak EYE / MOUTH coords. -->
<defs>
  <radialGradient id="rhalo" cx="50%" cy="48%" r="50%"><stop offset="0%" stop-color="#ff3b54" stop-opacity=".45"/><stop offset="65%" stop-color="#f0445a" stop-opacity=".12"/><stop offset="100%" stop-color="#f0445a" stop-opacity="0"/></radialGradient>
  <radialGradient id="reye" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffe2e2"/><stop offset="50%" stop-color="#ff3b54" stop-opacity=".95"/><stop offset="100%" stop-color="#ff3b54" stop-opacity="0"/></radialGradient>
  <radialGradient id="rmouth" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#ff6a3c" stop-opacity=".9"/><stop offset="60%" stop-color="#b00020" stop-opacity=".7"/><stop offset="100%" stop-color="#b00020" stop-opacity="0"/></radialGradient>
  <style>
    .halo{transform-box:fill-box;transform-origin:center;animation:rhalo 4s ease-in-out infinite}
    @keyframes rhalo{0%,55%,100%{opacity:.35;transform:scale(1)}66%{opacity:1;transform:scale(1.14)}}
    .fig{transform-box:fill-box;transform-origin:50% 70%;animation:rfig 4s cubic-bezier(.5,0,.25,1) infinite}
    @keyframes rfig{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-5px) scale(1.008)}58%{transform:translateY(0) scale(1)}66%{transform:translateY(-13px) scale(1.06)}80%{transform:translateY(-2px) scale(1.012)}100%{transform:translateY(0) scale(1)}}
    .eye{transform-box:fill-box;transform-origin:center;animation:reye 4s ease-in-out infinite}
    @keyframes reye{0%,52%,100%{opacity:.5;transform:scale(.92)}38%{opacity:.7}66%{opacity:1;transform:scale(1.45)}}
    .shock{transform-box:fill-box;transform-origin:center;opacity:0}
    .s1{animation:shock 4s ease-out infinite}.s2{animation:shock 4s ease-out .12s infinite}
    @keyframes shock{0%,60%{opacity:0;transform:scale(.2)}67%{opacity:.85}100%,88%{opacity:0;transform:scale(2.7)}}
    .mouth{transform-box:fill-box;transform-origin:center top;opacity:0;animation:mouth 4s ease-out infinite}
    @keyframes mouth{0%,60%{opacity:0;transform:scaleY(.12)}67%{opacity:.7;transform:scaleY(1)}80%{opacity:.4}100%,88%{opacity:0;transform:scaleY(.2)}}
    .em{opacity:0;animation:ember 5s linear infinite}
    @keyframes ember{0%{opacity:0;transform:translateY(0)}15%{opacity:.9}55%{opacity:.45}100%{opacity:0;transform:translateY(-240px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}.eye{opacity:.7}}
  </style>
</defs>
<ellipse class="halo" cx="364" cy="500" rx="320" ry="470" fill="url(#rhalo)"/>
<g class="fig"><image href="bear%20indicator.png" x="0" y="0" width="728" height="1016"/></g>
<!-- mouth flash (MOUTH) -->
<ellipse class="mouth" cx="364" cy="585" rx="64" ry="40" fill="url(#rmouth)"/>
<!-- eye flare (EYE_L / EYE_R) -->
<circle class="eye" cx="300" cy="335" r="30" fill="url(#reye)"/>
<circle class="eye" cx="430" cy="335" r="30" fill="url(#reye)"/>
<!-- roar shockwave rings -->
<circle class="shock s1" cx="364" cy="470" r="80" fill="none" stroke="#ff3b54" stroke-width="6"/>
<circle class="shock s2" cx="364" cy="470" r="80" fill="none" stroke="#ff7a3c" stroke-width="3"/>
<!-- floating embers -->
<circle class="em" cx="250" cy="780" r="3.5" fill="#ff7a3c"/><circle class="em" cx="470" cy="740" r="3" fill="#ff4d4d" style="animation-delay:1.1s"/>
<circle class="em" cx="360" cy="820" r="4" fill="#ff9a3c" style="animation-delay:2.2s"/><circle class="em" cx="430" cy="800" r="2.5" fill="#ff5a3c" style="animation-delay:3.3s"/>
<circle class="em" cx="290" cy="760" r="3" fill="#ff7a3c" style="animation-delay:4.1s"/><circle class="em" cx="400" cy="860" r="3.5" fill="#ff4d4d" style="animation-delay:4.7s"/>
</svg>
