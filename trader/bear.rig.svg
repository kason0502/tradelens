<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
<!-- BEAR — original vector, rigged. Idle breathing + glowing eyes + embers ->
     periodic ROAR every ~4s: jaw OPENS (real hinge), head pushes forward, eyes
     flare, red shockwave rings radiate. -->
<defs>
  <linearGradient id="rd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff5a6e"/><stop offset="1" stop-color="#c81e36"/></linearGradient>
  <radialGradient id="rHalo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ff3b54" stop-opacity=".45"/><stop offset="70%" stop-color="#f0445a" stop-opacity=".1"/><stop offset="100%" stop-color="#f0445a" stop-opacity="0"/></radialGradient>
  <radialGradient id="reyeG" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffe2e2"/><stop offset="50%" stop-color="#ff3b54" stop-opacity=".95"/><stop offset="100%" stop-color="#ff3b54" stop-opacity="0"/></radialGradient>
  <radialGradient id="mG" cx="50%" cy="35%" r="65%"><stop offset="0" stop-color="#ff8a3c" stop-opacity=".95"/><stop offset="55%" stop-color="#b00020" stop-opacity=".7"/><stop offset="100%" stop-color="#b00020" stop-opacity="0"/></radialGradient>
  <style>
    .halo{transform-box:fill-box;transform-origin:center;animation:halo 4s ease-in-out infinite}
    @keyframes halo{0%,54%,100%{opacity:.35;transform:scale(1)}66%{opacity:1;transform:scale(1.16)}}
    .bear{transform-box:fill-box;transform-origin:50% 74%;animation:bear 4s cubic-bezier(.5,0,.25,1) infinite}
    @keyframes bear{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-3px) scale(1.008)}58%{transform:translateY(0) scale(1)}66%{transform:translateY(-11px) scale(1.06)}80%{transform:translateY(-2px) scale(1.012)}100%{transform:translateY(0) scale(1)}}
    .jaw{transform-box:fill-box;transform-origin:50% 0%;animation:jaw 4s cubic-bezier(.4,0,.3,1) infinite}
    @keyframes jaw{0%,60%{transform:translateY(0) rotate(0)}68%{transform:translateY(14px) rotate(6deg)}80%{transform:translateY(6px) rotate(2deg)}100%{transform:translateY(0)}}
    .mglow{opacity:0;animation:mg 4s ease-out infinite}
    @keyframes mg{0%,60%{opacity:0}68%{opacity:.85}82%{opacity:.4}100%,90%{opacity:0}}
    .eye{transform-box:fill-box;transform-origin:center;animation:eye 4s ease-in-out infinite}
    @keyframes eye{0%,52%,100%{opacity:.5;transform:scale(.9)}38%{opacity:.7}66%{opacity:1;transform:scale(1.45)}}
    .shock{transform-box:fill-box;transform-origin:center;opacity:0}
    .s1{animation:shock 4s ease-out infinite}.s2{animation:shock 4s ease-out .12s infinite}
    @keyframes shock{0%,60%{opacity:0;transform:scale(.2)}67%{opacity:.85}100%,88%{opacity:0;transform:scale(2.7)}}
    .em{opacity:0;animation:em 5s linear infinite}
    @keyframes em{0%{opacity:0;transform:translateY(0)}15%{opacity:.9}55%{opacity:.45}100%{opacity:0;transform:translateY(-90px)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}.eye{opacity:.7}}
  </style>
</defs>
<ellipse class="halo" cx="120" cy="126" rx="104" ry="112" fill="url(#rHalo)"/>
<g class="bear">
  <!-- ears -->
  <circle cx="80" cy="64" r="22" fill="url(#rd)"/><circle cx="160" cy="64" r="22" fill="url(#rd)"/>
  <circle cx="80" cy="64" r="11" fill="#7a0d1a"/><circle cx="160" cy="64" r="11" fill="#7a0d1a"/>
  <!-- head -->
  <path d="M120 58 C 80 58 58 90 58 128 C 58 172 88 198 120 198 C 152 198 182 172 182 128 C 182 90 160 58 120 58 Z" fill="url(#rd)"/>
  <!-- mouth interior + glow (revealed when the jaw drops) -->
  <path d="M98 150 C 98 178 108 192 120 192 C 132 192 142 178 142 150 Z" fill="#2a0008"/>
  <ellipse class="mglow" cx="120" cy="168" rx="26" ry="22" fill="url(#mG)"/>
  <!-- upper teeth -->
  <g fill="#fff"><path d="M105 150 l7 0 -3.5 12 z"/><path d="M116 150 l7 0 -3.5 13 z"/><path d="M127 150 l7 0 -3.5 12 z"/></g>
  <!-- lower jaw (real hinge) -->
  <g class="jaw">
    <path d="M96 150 C 96 176 106 190 120 190 C 134 190 144 176 144 150 Z" fill="url(#rd)"/>
    <g fill="#fff"><path d="M107 166 l7 0 -3.5 -12 z"/><path d="M118 168 l7 0 -3.5 -13 z"/><path d="M129 166 l7 0 -3.5 -12 z"/></g>
  </g>
  <!-- snout shading + nose -->
  <ellipse cx="120" cy="140" rx="22" ry="16" fill="#7a0d1a" opacity=".35"/>
  <path d="M111 130 C 111 124 129 124 129 130 C 129 138 120 143 120 143 C 120 143 111 138 111 130 Z" fill="#2a0008"/>
  <!-- eyes (dark) -->
  <ellipse cx="98" cy="116" rx="8" ry="6.5" fill="#2a0008"/><ellipse cx="142" cy="116" rx="8" ry="6.5" fill="#2a0008"/>
  <!-- eye glow -->
  <circle class="eye" cx="98" cy="116" r="13" fill="url(#reyeG)"/><circle class="eye" cx="142" cy="116" r="13" fill="url(#reyeG)"/>
</g>
<!-- roar shockwave -->
<circle class="shock s1" cx="120" cy="150" r="48" fill="none" stroke="#ff3b54" stroke-width="5"/>
<circle class="shock s2" cx="120" cy="150" r="48" fill="none" stroke="#ff7a3c" stroke-width="2.5"/>
<!-- embers -->
<circle class="em" cx="86" cy="180" r="2.6" fill="#ff7a3c"/><circle class="em" cx="156" cy="166" r="2.2" fill="#ff4d4d" style="animation-delay:1.1s"/>
<circle class="em" cx="120" cy="190" r="3" fill="#ff9a3c" style="animation-delay:2.2s"/><circle class="em" cx="140" cy="182" r="2" fill="#ff5a3c" style="animation-delay:3.3s"/>
<circle class="em" cx="100" cy="172" r="2.4" fill="#ff7a3c" style="animation-delay:4.2s"/>
</svg>
